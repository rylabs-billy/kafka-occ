name: check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set test UDFs
        shell: bash
        run: ./scripts/test-vars.sh

      - name: Hack github actions runner for check mode
        shell: bash
        run: |-
          chown_list=(
          "/var/lib/apt/lists"
          "/var/lib/dpkg" 
          "/var/cache/apt"
          "/dev/ttyS0"
          "/var/log"
          "/usr/local/bin"
          )

          for dir in "${chown_list[@]}"; do
            echo "$dir is current item"
            if [ "${dir}" != "/dev/ttyS0" ]; then
              sudo mkdir -p $dir
              if [ "${dir}" == "/usr/local/bin" ]; then
                echo "$dir" >> "$GITHUB_PATH"
              fi
            fi
            sudo chown -R $(whoami): $dir
          done
    
      - name: print path
        shell: bash
        run: echo $GITHUB_PATH

      - name: Run playbooks in check mode
        shell: bash
        run: |-
          sudo -i -u $(whoami)
          cd $GITHUB_WORKSPACE
          ./scripts/kafka-deploy.sh
        env:
          CHECK_MODE: 1
