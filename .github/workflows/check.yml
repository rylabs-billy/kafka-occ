name: check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set test UDFs
        shell: bash
        run: ./scripts/test-vars.sh

      - name: Hack github actions runner for check mode
        shell: bash
        run: |-
          chown_list=(
          "/var/lib/apt/lists"
          "/var/lib/dpkg" 
          "/var/cache/apt"
          "/dev/ttyS0"
          "/var/log"
          "/usr/local/bin"
          )

          for dir in "${chown_list[@]}"; do
            sudo chown -R $(whoami): $dir
            if [ "${dir}" != "/dev/ttyS0" ]; then
              sudo mkdir -p $dir
            fi
            
            if [ "${dir}" == "/usr/local/bin" ]; then
              echo "$dir" >> $GITHUB_PATH
            fi
          done

          sudo sed -i -e 's/#ListenAddress 0.0.0.0/ListenAddress 0.0.0.0/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

      - name: Run deploy script in check mode
        shell: bash
        run: |-
          sudo -i -u $(whoami)
          cd $GITHUB_WORKSPACE
          ./scripts/kafka-deploy.sh
        env:
          TOKEN_PASSWORD: r3@llystr0ngp455w0rd
          CHECK_MODE: 1
