name: check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set test UDFs
        shell: bash
        run: ./scripts/test-vars.sh

      - name: Hack github actions runner for check mode
        shell: bash
        run: |-
          chown_list=(
          "/var/lib/apt/lists"
          "/var/lib/dpkg" 
          "/var/cache/apt"
          "/dev/ttyS0"
          "/var/log"
          "/usr/local/bin"
          )

          for dir in "${chown_list[@]}"; do
            sudo chown -R $(whoami): $dir
            if [ "${dir}" != "/dev/ttyS0" ]; then
              sudo mkdir -p $dir
            fi
            
            if [ "${dir}" == "/usr/local/bin" ]; then
              echo "$dir" >> $GITHUB_PATH
            fi
          done
    
      # - name: Add run script to path
      #   shell: bash
      #   run: echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Run deploy script in check mode
        shell: bash
        run: |-
          sudo -i -u $(whoami)
          cd $GITHUB_WORKSPACE
          ./scripts/kafka-deploy.sh
          ls /tmp/linode
          ls -la /usr/local/bin/
          cat /usr/local/bin/run
          run test
        env:
          CHECK_MODE: 1
          GIT_REPO: https://github.com/rylabs-billy/kafka-occ.git

      - name: Copy run script to path
        shell: bash
        run: |
          pwd
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Run playbooks in check mode
        shell: bash
        run: |
          pwd
          run test
          run build